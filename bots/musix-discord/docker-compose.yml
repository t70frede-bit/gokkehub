# docker-compose.yml — bring the bot up with `docker compose up -d`.
# Requires a `.env` file in this directory (copy from .env.example and
# fill in DISCORD_BOT_TOKEN / DISCORD_CLIENT_ID / SUPABASE_SERVICE_ROLE_KEY).

services:
  musix-discord:
    build: .
    container_name: musix-discord
    restart: unless-stopped
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DISCORD_DEV_GUILD_ID: ${DISCORD_DEV_GUILD_ID}
      # HTTP audio proxy — see README. Port 8080 inside the container.
      PORT: ${PORT:-8080}
      STREAM_TOKEN: ${STREAM_TOKEN}
      STREAM_CORS: ${STREAM_CORS:-https://musix.gokkehub.com}
    ports:
      # Audio proxy. Reverse-proxy this behind your own HTTPS domain
      # (e.g. musix-bot.example.com → 127.0.0.1:8080) and set that URL
      # as the streamProxyUrl in a musix lobby's all-clients-stream mode.
      - "${PORT:-8080}:8080"
    volumes:
      # Persist the auto-downloaded yt-dlp binary so container restarts
      # don't re-fetch the ~30MB binary every time.
      - musix-bin:/app/bin

# Attach to the operator's existing nginx-proxy-manager network so the
# reverse proxy can route an external HTTPS subdomain (e.g.
# musix-bot.example.com) to the bot's audio port on this network.
# Comment out or remove if you're not running nginx-proxy-manager.
networks:
  default:
    external: true
    name: nginxpm

volumes:
  musix-bin:
