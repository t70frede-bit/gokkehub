name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build all apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build
        env:
          # gridchallenge reads these at build time via import.meta.env.VITE_*
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/web/dist
            apps/gridchallenge/dist
          retention-days: 1

  # ── Deploy web (gokkehub.com) ─────────────────────────────────────────────────
  # web now has Pages Functions (apps/web/functions/api/find-room.ts), so we
  # deploy with `workingDirectory: apps/web` and `pages deploy dist`. Wrangler
  # auto-detects `apps/web/functions/` next to the working directory and
  # bundles those routes. A bare `pages deploy apps/web/dist` from repo root
  # skips Functions entirely (which is why the lookup was 404'ing into the SPA
  # fallback).
  deploy-web:
    name: Deploy web
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace=apps/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=web --branch=main

  # ── Deploy account (account.gokkehub.com) ────────────────────────────────────
  # account has Pages Functions that import workspace packages (@gokkehub/auth, @gokkehub/db)
  # wrangler must bundle the functions, which requires node_modules to be present.
  # So we checkout + install the full repo here instead of using the build artifact.
  deploy-account:
    name: Deploy account
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build account app
        run: npm run build --workspace=apps/account
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/account
          command: pages deploy dist --project-name=account --branch=main

  # ── Deploy gridchallenge (partybingo.gokkehub.com) ───────────────────────────
  deploy-gridchallenge:
    name: Deploy gridchallenge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/gridchallenge/dist --project-name=gridchallenge --branch=main

  # ── Deploy timelinedrop (musix.gokkehub.com) ────────────────────────────────
  deploy-timelinedrop:
    name: Deploy timelinedrop
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build timelinedrop app
        run: npm run build --workspace=apps/timelinedrop
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/timelinedrop
          command: pages deploy dist --project-name=timelinedrop --branch=main

  # ── Deploy poker (poker.gokkehub.com) ───────────────────────────────────────
  # Mirrors the timelinedrop/account pattern: checkout + install the full repo so
  # workspace packages (@gokkehub/ui, @gokkehub/config) resolve, build only the
  # poker workspace, then `pages deploy dist` from apps/poker. The MobilePay
  # number + tracking prefix are extra build-time env vars (client-inlined).
  # ADDED for the poker app — does not touch any existing job above.
  deploy-poker:
    name: Deploy poker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build poker app
        run: npm run build --workspace=apps/poker
        env:
          VITE_SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_MOBILEPAY_NUMBER:  ${{ secrets.POKER_MOBILEPAY_NUMBER }}
          VITE_TRACKING_PREFIX:   ${{ secrets.POKER_TRACKING_PREFIX }}
          VITE_SITE_CODE:         ${{ secrets.POKER_SITE_CODE }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/poker
          command: pages deploy dist --project-name=poker --branch=main

  # trackguess, beatrank deploy jobs will be added once those apps are built
