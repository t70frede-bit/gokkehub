name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build all apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build
        env:
          # gridchallenge reads these at build time via import.meta.env.VITE_*
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          # Upload the full app directory so wrangler can find functions/ next to dist/
          path: |
            apps/web/dist
            apps/account/dist
            apps/account/functions
            apps/account/wrangler.toml
            apps/gridchallenge/dist
          retention-days: 1

  # ── Deploy web (gokkehub.com) ─────────────────────────────────────────────────
  deploy-web:
    name: Deploy web
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=web --branch=main

  # ── Deploy account (account.gokkehub.com) ────────────────────────────────────
  # Runs wrangler from apps/account/ so it picks up functions/ alongside dist/
  deploy-account:
    name: Deploy account
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/account
          command: pages deploy dist --project-name=account --branch=main

  # ── Deploy gridchallenge (partybingo.gokkehub.com) ───────────────────────────
  deploy-gridchallenge:
    name: Deploy gridchallenge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: apps

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/gridchallenge/dist --project-name=gridchallenge --branch=main

  # trackguess, timelinedrop, beatrank deploy jobs will be added once those apps are built
